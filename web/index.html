<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="chunha">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>chunha</title>
  <link rel="manifest" href="manifest.json">
  <style>
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #f8f9fa;
      flex-direction: column;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .house-loading {
      font-size: 64px;
      animation: bounce 0.8s ease-in-out infinite;
      user-select: none;
    }

    .shadow {
      width: 40px;
      height: 6px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      margin-top: 5px;
      animation: shadow-scale 0.8s ease-in-out infinite;
    }

    .loading-text {
      margin-top: 25px;
      color: #2196F3;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-30px);
      }
    }

    @keyframes shadow-scale {

      0%,
      100% {
        transform: scaleX(1);
        opacity: 0.1;
      }

      50% {
        transform: scaleX(0.4);
        opacity: 0.04;
      }
    }
  </style>
</head>

<body>
  <div id="loading-indicator" class="loading-container">
    <div class="house-loading">🏠</div>
    <div class="shadow"></div>
    <div class="loading-text">Chủ Nhà đang chuẩn bị phòng...</div>
  </div>
  <!-- Firebase JS SDK (bắt buộc cho Flutter Web) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
